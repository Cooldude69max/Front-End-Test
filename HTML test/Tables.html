<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables-Html</title>
    <style>
        table {
            width: 80%;
            border-collapse: collapse;
            margin: 20px 0;
            font-family: Arial, sans-serif;
        }
        th, td {
            border: 1px solid #000;
            padding: 10px;
            text-align: center;
        }
        thead {
            background-color: #f2f2f2;
        }
        tbody tr:nth-child(even) {
            background-color: #f9f9f9;
        }
    </style>

</head>
<body>
    <h1 style="color: green">Tables in html</h1>

    <table>
        <!--head of the table-->
        <caption>Top Laptop Models in 2026</caption>
        
        <thead>

            <tr>
                <th>Manufacturer</th>
                <th>Model</th>
                <th>RAM</th>
                <th>Storage</th>
                <th>Price</th>

            </tr>

        </thead>
        <!--body of the table-->
        <tbody>
            <tr>
                <td>Asus</td>
                <td>Asus vivobook 14</td>
                <td>16GB</td>
                <td>512GB</td>
                <td>59999</td>
            </tr>
            <tr>
                <td>Acer</td>
                <td>Aspire 3 A324-51</td>
                <td>16GB</td>
                <td>512GB</td>
                <td>45000</td>
            </tr>

            <tr>
                <td>Hp</td>
                <td>victus gaming</td>
                <td>16GB</td>
                <td>1000GB</td>
                <td>69000</td>
            </tr>

            <tr>
                <td>lenovo</td>
                <td>Legion</td>
                <td>16GB</td>
                <td>1000GB</td>
                <td>79000</td>
            
            </tr>

        </tbody>

    </table>


    </body>

</html>
