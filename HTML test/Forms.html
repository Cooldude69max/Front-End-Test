<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms in html</title>
    <style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* Page styling */
body{
    font-family: Arial, Helvetica, sans-serif;
    background: #f2f2f2;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Form container */
form{
    background: white;
    padding: 25px 35px;
    border-radius: 10px;
    width: 350px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

/* Heading */
h1{
    text-align: center;
    margin-bottom: 20px;
}

/* Form fields spacing */
form div{
    margin-bottom: 15px;
}

/* Labels */
label{
    display: block;
    margin-bottom: 5px;
    font-weight: bold;
}

/* Inputs, select, textarea */
input, select, textarea{
    width: 100%;
    padding: 8px;
    border: 1px solid #ccc;
    border-radius: 5px;
    font-size: 14px;
}

/* Radio buttons */
input[type="radio"]{
    width: auto;
    margin-right: 5px;
}

/* Submit button */
input[type="submit"]{
    background: #007bff;
    color: white;
    border: none;
    padding: 10px;
    cursor: pointer;
    font-size: 16px;
    transition: 0.3s;
}

/* Hover effect */
input[type="submit"]:hover{
    background: #0056b3;
}
</style>
</head>

<body>
    

    <form action="/contact.me">
        <div>
            <label for="name">Name</label>
            <input id="name" name="name" type="text" placeholder="Enter name">
        </div>

        <div>

            <label for="ph">Phone</label>
            <input id="ph"  name="phone"   type="tel" placeholder="Enter your phone" required>

        </div>

        <div>

            <label for="Email">Email</label>
            <input id="Email" name="Email"  type="email" placeholder="Enter your email"required>

        </div>

        <div>
            <label for="password">Password</label>
            <input id="password" name="password"   type="password" placeholder="Enter your password"required>
        </div>

        <div>
            <label for="DOB">Date of birth</label>
            <input id="DOB" name="DOB"  type="date" required>
        </div>

        <div>
            <label for="gender">Gender</label>

            <select id="gender" name="gender" required>
           
                <option value=""disabled selected>Select Gender</option>
           
                <option value="male">Male</option>
            
                <option value="Female">Female</option>
            
                <option value="Other">Other</option>

            </select>

        </div>

       <div>

        <p>Subscription Plans</p>
        <input type="radio" id="basic" name="Plans" value=" Basic">
        <label for="basic">basic</label>

        
        <input type="radio" id="Premium" name="Plans" value="Premium">
        <label for="Premium">Premium</label>

        
          <input type="radio" id="Gold" name="Plans" value="Gold">
          <label for="Gold">Gold</label>
        
        </div>
        
        <div>
            <label for="comments">comments</label>
            <textarea id="comments" name="comments" placeholder="Enter your comments" rows="5"></textarea>
        </div>

        <div><input type="submit" value="Submit"></div>


    </form>
</body>
